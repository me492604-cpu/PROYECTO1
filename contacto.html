<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOPOGRAFIA</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <h1>Servicios de Topografia</h1>
      <nav>
        <a href="index.html" target="_blank">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="#">Contacto</a>
      </nav>
    </header>
    
    <section class="hero">
      <div class="contact-tabs">
        <button class="tablink active" onclick="openTab(event, 'info')">Información de Contacto</button>
        <button class="tablink" onclick="openTab(event, 'form')">Formulario</button>
      </div>
      <div id="info" class="tabcontent" style="display:block;">
        <h3>Información de Contacto</h3>
        <ul>
          <li><strong>Teléfono:</strong> +52 123 456 7890</li>
          <li><strong>Email:</strong> contacto@topografia.com</li>
          <li><strong>Dirección:</strong> Calle Ejemplo 123, Ciudad, País</li>
        </ul>
      </div>
      <div id="form" class="tabcontent" style="display:none;">
        <h3>Envíanos un Mensaje</h3>
        <form>
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required>
          <label for="email">Correo:</label>
          <input type="email" id="email" name="email" required>
          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje" required></textarea>
          <button type="submit">Enviar</button>
        </form>
      </div>
      <script>
      function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
          tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tablink");
        for (i = 0; i < tablinks.length; i++) {
          tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
      }
      </script>
      
      <p>Utiliza la Topografia a tu favor</p>
      <a href="cotizacion.html" target="_blank">COTIZACION</a>
    </section>

    <footer>
      <p>© 2025 Francisco Meza</p>
    </footer>
  </body>
</html>
